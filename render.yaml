services:
  - type: web
    name: istoria-pos
    env: nixpacks
    region: ohio
    buildCommand: bash build.sh
    startCommand: dotnet ./out/CafeWebsite.dll
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        sync: false
      - key: DOTNET_USE_POLLING_FILE_WATCHER
        value: '1'
